@startuml
class App {
    + main(String[] args) : void
}
class Person {
    - nachname : String
    + setNachname(String nachname) : void
    + getNachname() : String
}
class Lehrer {
    - fachbereich : String
    + getFachbereich() : String 
    + setFachbereich(String fachbereich) : void
}
class Lernende {
    - nummer : int 
    + setNummer(int nummer) : void
    + getNummer() : int
}

Person <|- - Lehrer : "extends"
Person <|- - Lernende : "extends"
@enduml

