@startuml
class App {
    + main(String[] args) : void
}

class GeomObject {
    # flaeche : double
    # umfang : double
    + vorstellen() : String
}

class RechtWinkligesDreieck {
    - seitea : double
    - seiteb : double
    - seitec : double
    + RechtWinkligesDreieck(double seitea, double seiteb)
    + berechneUmfang() : void
    + berechneFlaeche() : void
    + vorstellen() : String
}

class Kreis {
    - radius : double
    + Kreis(double radius)
    + berechneUmfang() : void
    + berechneFlaeche() : void
    + vorstellen() : String
}

class Viereck {
    - seitea : double
    - seiteb : double
    + Viereck(double seitea, double seiteb)
    + berechneUmfang() : void
    + berechneFlaeche() : void
    + vorstellen() : String
}

GeomObject <|- - RechtWinkligesDreieck : "extends"
GeomObject <|- - Kreis : "extends"
GeomObject <|- - Viereck : "extends"
@enduml

